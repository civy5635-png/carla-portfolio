<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <style>
        body {
            background-color: #e8dcc8;
            color: #1e293b;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .hero-header {
            background: linear-gradient(
                rgba(30, 41, 59, 0.55),
                rgba(30, 41, 59, 0.55)
            ),
            url('media-portfolio-redesign/header-image.jpg');
            background-size: cover;
            background-position: center;
            text-align: center;
            color: white;
            padding: 60px 20px;
        }

        .overlay h1 {
            margin: 0;
            font-size: 3rem;
        }

        .page-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .thank-you-box {
            background: rgba(255,255,255,0.45);
            border: 3px solid #d97706;
            border-radius: 20px;
            padding: 50px;
        }

        .thank-you-box h2 {
            color: #1e293b;
            margin-top: 0;
        }

        .return-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background-color: #d97706;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .return-button:hover {
            background-color: #b45309;
        }

        @media (max-width: 768px) {
            .overlay h1 {
                font-size: 2rem;
            }

            .thank-you-box {
                padding: 30px 20px;
            }
        }
    </style>

</head>
<body>

<header class="hero-header">
    <div class="overlay">
        <h1>Thank You!</h1>
    </div>
</header>

<main class="page-container">
    <h2>Message Received</h2>
    <p>
        Thank you for reaching out. I've received your message and will get back to you as soon as possible.
    </p>

    <p>
        <a href="index.html" class="return-button">Return to Home Page</a>
    </p>
</main>

</body>
</html>
